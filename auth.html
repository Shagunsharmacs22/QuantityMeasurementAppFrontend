<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Auth System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:url("https://images.unsplash.com/photo-1496307042754-b4aa456c4a2d") no-repeat center/cover;
}
body::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(4px);
}
.container{
  width:800px;
  height:500px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(25px);
  border-radius:20px;
  overflow:hidden;
  position:relative;
  box-shadow:0 20px 50px rgba(0,0,0,0.6);
}
.form{
  position:absolute;
  width:50%;
  height:100%;
  padding:40px;
  transition:0.6s;
  color:white;
}
.login{ left:0; }
.signup{ left:100%; }
.container.active .login{ left:-100%; }
.container.active .signup{ left:0; }
h2{margin-bottom:20px;}
input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:10px;
  outline:none;
}
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#ff416c,#ff4b2b);
  color:white;
  cursor:pointer;
  margin-top:10px;
}
.google-btn{
  background:#4285F4;
}
.switch-text{
  margin-top:15px;
  font-size:14px;
}
.switch-text span{
  color:#ffd;
  cursor:pointer;
  font-weight:bold;
}
.panel{
  position:absolute;
  right:0;
  width:50%;
  height:100%;
  background:url("https://images.unsplash.com/photo-1522202176988-66273c2fd55f") no-repeat center/cover;
}
.panel::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
}
</style>
</head>

<body>

<div class="container" id="container">

  <!-- LOGIN -->
  <div class="form login">
    <h2>Welcome Back 👋</h2>

    <input type="email" id="loginEmail" placeholder="Email">
    <input type="password" id="loginPass" placeholder="Password">

    <button onclick="login()">Login</button>

    <!-- GOOGLE LOGIN -->
    <button class="google-btn" onclick="googleLogin()">Login with Google</button>

    <div class="switch-text">
      Don't have an account? <span onclick="toggle()">Sign up</span>
    </div>
  </div>

  <!-- SIGNUP -->
  <div class="form signup">
    <h2>Create Account 🚀</h2>

    <input type="text" id="name" placeholder="Full Name">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="pass" placeholder="Password">
    <input type="password" id="confirm" placeholder="Confirm Password">

    <button onclick="signup()">Sign Up</button>

    <div class="switch-text">
      Already have an account? <span onclick="toggle()">Login</span>
    </div>
  </div>

  <div class="panel"></div>

</div>

<script>

const BASE_URL = "http://localhost:8080/auth";
// 🔥 handle google redirect token
const params = new URLSearchParams(window.location.search);
const token = params.get("token");

if(token){
  localStorage.setItem("token", token);
  window.location.href = "index.html";
}
// 🔐 Redirect if already logged in
if(localStorage.getItem("token")){
  window.location.href = "index.html";
}

function toggle(){
  document.getElementById("container").classList.toggle("active");
}

// ✅ SIGNUP
async function signup(){
  const name=document.getElementById("name").value.trim();
  const email=document.getElementById("email").value.trim();
  const pass=document.getElementById("pass").value.trim();
  const confirm=document.getElementById("confirm").value.trim();

  if(!name || !email || !pass || !confirm){
    alert("Fill all fields");
    return;
  }

  if(pass !== confirm){
    alert("Passwords do not match!");
    return;
  }

  const data = { name, email, password: pass, provider: "LOCAL" };

  try{
    const response = await fetch(`${BASE_URL}/register`,{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify(data)
    });

    if(!response.ok){
      const err = await response.json();
      throw new Error(err.message || "Signup failed");
    }

    const token = await response.text();
    localStorage.setItem("token", token);

    alert("Signup Success 🎉");
    window.location.href="index.html";

  }catch(e){
    console.error(e);
    alert("Signup failed ❌ " + e.message);
  }
}

// 🔐 LOGIN
async function login(){
  const email=document.getElementById("loginEmail").value.trim();
  const pass=document.getElementById("loginPass").value.trim();

  if(!email || !pass){
    alert("Enter email & password");
    return;
  }

  const data = { email, password: pass };

  try{
    const response = await fetch(`${BASE_URL}/login`,{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify(data)
    });

    if(!response.ok){
      const err = await response.json();
      throw new Error(err.message || "Login failed");
    }

    const token = await response.text();
    localStorage.setItem("token", token);

    alert("Login Success ✅");
    window.location.href="index.html";

  }catch(e){
    console.error(e);
    alert("Invalid credentials ❌ " + e.message);
  }
}

// 🔥 GOOGLE LOGIN
function googleLogin(){
  window.location.href = `${BASE_URL}/google`;
}

</script>

</body>
</html>
